name: performance_management_dgt
description: App de Gestão de Desempenho DGT — ciclo de metas, avaliações, feedbacks e promoções.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP / API
  dio: ^5.4.3

  # Secure storage (tokens)
  flutter_secure_storage: ^9.0.0

  # Internacionalização
  intl: ^0.19.0

  # Serialização
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2

  # Gráficos / progresso
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  timeline_tile: ^2.0.0

  # Calendário (reuniões)
  table_calendar: ^3.1.1

  # Paginação
  infinite_scroll_pagination: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700